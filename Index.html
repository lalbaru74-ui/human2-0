<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human 2.0 | System Upgrade Waiting List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-blue: #00F0FF;
            --accent-magenta: #FF00E5;
            --glass: rgba(11, 14, 20, 0.8);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pulsierender Hintergrund-Effekt */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 240, 255, 0.05) 0%, rgba(5, 7, 10, 1) 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--accent-blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .status-bar {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .status-progress {
            position: absolute;
            height: 100%;
            width: 40%;
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { left: -40%; }
            100% { left: 140%; }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="email"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 25px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="email"]:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        button {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            background: #fff;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Erfogls-Nachricht Styling */
        .success-message {
            display: none;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-blue);
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="glass-card">
            <div class="logo">Neural Life Protocol</div>
            <h1>SYSTEM UPGRADE VERFÜGBAR</h1>
            <p>Die Version 2.0 der menschlichen Existenz befindet sich in der finalen Initialisierung. Sichere dir den Early Access zur Masterclass & Community.</p>
            
            <div class="status-bar">
                <div class="status-progress"></div>
            </div>

            <!-- FormSubmit verarbeitet die E-Mails kostenlos -->
            <form action="https://formsubmit.co/DEINE-EMAIL-HIER" method="POST">
                <input type="hidden" name="_subject" value="Neuer Human 2.0 Wartelisten-Eintrag!">
                <input type="hidden" name="_next" value="https://DEIN-GITHUB-NAME.github.io/human2-0/success.html">
                <input type="email" name="email" placeholder="DEINE E-MAIL-ADRESSE" required>
                <button type="submit">UPGRADE INITIALISIEREN</button>
            </form>

            <div class="footer-note">Access limited to qualified units only.</div>
        </div>
    </div>

</body>
</html>
